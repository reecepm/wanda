appId: com.wanda.dev
productName: Wanda Dev
icon: resources/icon-dev.png
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - resources/tray/**/*
  - node_modules/**/*
  - package.json
extraResources:
  - from: electron/db/migrations
    to: migrations
  - from: electron/mcp/dist
    to: mcp
  - from: resources/dock-icon.png
    to: dock-icon.png
  - from: resources/dock-icon-dev.png
    to: dock-icon-dev.png
mac:
  icon: resources/icon-dev.icon
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  hardenedRuntime: true
win:
  target:
    - nsis
linux:
  target:
    - AppImage
    - deb
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
